name: Docker Build and Publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag for semantic versioning (e.g., v1.2.3)'
        required: false
        type: string
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # Tag PRs with pr-<number>
            type=ref,event=pr,prefix=pr-
            # Tag branches with branch name
            type=ref,event=branch
            # Tag latest for main branch (only when not a release)
            type=raw,value=latest,enable=${{ is_default_branch && inputs.release_tag == '' }}
            # Semantic versioning for releases (only when release_tag is provided)
            type=semver,pattern={{version}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            type=semver,pattern={{major}},value=${{ inputs.release_tag }},enable=${{ inputs.release_tag != '' }}
            # Latest tag for releases
            type=raw,value=latest,enable=${{ inputs.release_tag != '' }}
          labels: |
            org.opencontainers.image.title=Actual Budget MCP Server
            org.opencontainers.image.description=MCP server for integrating Actual Budget with Claude and other LLM assistants
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Only push if not a PR from a fork (forks don't have package write permission)
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
